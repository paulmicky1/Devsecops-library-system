<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
<h1>Login</h1>

<p th:if="${param.success}" style="color: green;">Registration successful. You can now sign in.</p>
<p th:if="${param.error}" style="color: red;">Invalid username or password.</p>
<p th:if="${param.logout}" style="color: green;">You have been logged out.</p>

<form th:action="@{/login}" method="post">
    <div>
        <label for="username">Username</label>
        <input id="username" name="username" type="text" required>
    </div>
    <div>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required>
    </div>
    <button type="submit">Sign in</button>
</form>

<p>Don't have an account? <a th:href="@{/register}">Register</a></p>
</body>
</html>
