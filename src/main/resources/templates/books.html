<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books Inventory</title>
</head>
<body>
<h1>Books Inventory</h1>

<p th:if="${param.borrowSuccess}" style="color: green;">Borrow request submitted successfully.</p>

<form th:action="@{/books}" method="get">
    <label for="keyword">Search by title or category</label>
    <input id="keyword" name="keyword" type="text" th:value="${keyword}">
    <button type="submit">Search</button>
    <a th:href="@{/books}">Clear</a>
</form>

<div sec:authorize="hasRole('LIBRARIAN')">
    <h2>Add Book</h2>
    <form th:action="@{/books/add}" method="post" th:object="${book}">
        <div>
            <label for="title">Title</label>
            <input id="title" type="text" th:field="*{title}" required>
        </div>
        <div>
            <label for="category">Category</label>
            <input id="category" type="text" th:field="*{category}" required>
        </div>
        <div>
            <label for="available">Available</label>
            <input id="available" type="checkbox" th:field="*{available}">
        </div>
        <button type="submit">Add Book</button>
    </form>
</div>

<h2>Book List</h2>
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Category</th>
        <th>Available</th>
        <th sec:authorize="hasRole('USER')">Borrow</th>
        <th sec:authorize="hasRole('LIBRARIAN')">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(books)}" sec:authorize="hasRole('USER')">
        <td colspan="6">No books found.</td>
    </tr>
    <tr th:if="${#lists.isEmpty(books)}" sec:authorize="hasRole('LIBRARIAN')">
        <td colspan="5">No books found.</td>
    </tr>
    <tr th:each="bookItem : ${books}">
        <td th:text="${bookItem.id}">1</td>
        <td th:text="${bookItem.title}">Sample title</td>
        <td th:text="${bookItem.category}">Sample category</td>
        <td th:text="${bookItem.available} ? 'Yes' : 'No'">Yes</td>
        <td sec:authorize="hasRole('USER')">
            <form th:action="@{/borrow/request/{id}(id=${bookItem.id})}" method="post">
                <button type="submit">Borrow</button>
            </form>
        </td>
        <td sec:authorize="hasRole('LIBRARIAN')">
            <form th:action="@{/books/delete/{id}(id=${bookItem.id})}" method="post">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<p sec:authorize="hasRole('USER')"><a th:href="@{/borrow/my-requests}">View My Requests</a></p>
<p sec:authorize="hasRole('LIBRARIAN')"><a th:href="@{/borrow/manage}">Manage Borrow Requests</a></p>
<p><a th:href="@{/}">Back to home</a></p>
</body>
</html>
