name: CI Security Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and run tests
        run: mvn -B clean verify

  sast-semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: build-and-test
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Run Semgrep rules
        run: semgrep scan --config p/java --config p/owasp-top-ten --error

  dependency-scan:
    name: Dependency Scan (OWASP)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: OWASP dependency check
        run: mvn -B org.owasp:dependency-check-maven:check
