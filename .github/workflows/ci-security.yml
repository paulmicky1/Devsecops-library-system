name: CI Security Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      run_zap:
        description: "Run optional OWASP ZAP baseline scan and export reports"
        required: false
        type: boolean
        default: false
      zap_target_url:
        description: "Target URL for ZAP scan (used when run_zap=true)"
        required: false
        type: string
        default: "http://localhost:8080"

permissions:
  contents: read
  security-events: write

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and run tests
        run: mvn -B clean verify

  documentation-check:
    name: Documentation and Threat Model Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify required security documentation exists
        run: |
          test -f "docs/threat-model/Mini-Library-STRIDE-Threat-Model.tm7"
          test -f "docs/assignment/Final-Project-Description.pdf"
          test -f "docs/evidence/dast/zap/session/SecureLibrary_Vulnerability_Scan.session"
          test -f "docs/evidence/dast/zap/session/SecureLibrary_Vulnerability_Scan.session.script"
          test -f "docs/evidence/dast/zap/session/SecureLibrary_Vulnerability_Scan.session.properties"

      - name: Upload threat model and evidence as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-documentation
          path: |
            docs/threat-model/**
            docs/evidence/**

  sast-semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: [build-and-test, documentation-check]
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Run Semgrep rules
        run: semgrep scan --config p/java --config p/owasp-top-ten --error

  dependency-scan:
    name: Dependency Scan (OWASP)
    runs-on: ubuntu-latest
    needs: [build-and-test, documentation-check]
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: OWASP dependency check
        run: mvn -B org.owasp:dependency-check-maven:check

  dast-zap-optional:
    name: DAST (OWASP ZAP Optional)
    runs-on: ubuntu-latest
    needs: [build-and-test, documentation-check]
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_zap) || vars.ZAP_ENABLED == 'true' }}
    env:
      ZAP_TARGET_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.zap_target_url || vars.ZAP_TARGET_URL }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Validate ZAP target URL
        run: |
          if [ -z "${ZAP_TARGET_URL}" ]; then
            echo "ZAP_TARGET_URL is empty. Set workflow input zap_target_url or repo variable ZAP_TARGET_URL."
            exit 1
          fi
          echo "ZAP target: ${ZAP_TARGET_URL}"

      - name: Start application
        run: |
          mvn -B -DskipTests spring-boot:run > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for application startup
        run: |
          for i in {1..60}; do
            if curl -fsS "${ZAP_TARGET_URL}" >/dev/null; then
              echo "Application is up."
              exit 0
            fi
            sleep 2
          done
          echo "Application did not start in time."
          exit 1

      - name: Run ZAP baseline scan and export HTML/JSON
        run: |
          mkdir -p zap-report
          docker run --rm --network=host \
            -v "${{ github.workspace }}/zap-report:/zap/wrk/:rw" \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t "${ZAP_TARGET_URL}" \
            -J zap-report.json \
            -r zap-report.html \
            -m 3 || true

      - name: Upload ZAP reports
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-report
          path: |
            zap-report/zap-report.html
            zap-report/zap-report.json
            app.log

      - name: Stop application
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi
